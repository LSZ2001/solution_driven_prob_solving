function makePracticeRouteTrial({
  sampledItem,
  localTrialIndex,
  targetPathString,
  routeNumber,
  isCued,
  attemptTag,
  sampledSet,
  subject_mapping,
  subject_ring_order,
  CONFIG,
  rowByTrialIdx
}) {
  const problem = JSON.parse(JSON.stringify(sampledItem.problem));
  const layout = JSON.parse(JSON.stringify(sampledItem.layout));
  layout.ring_order = subject_ring_order.slice();

  const displayedTarget = convertPathToDisplayedCityNames(targetPathString, subject_mapping);

  var hintHtml = isCued
    ? `<p><b>Please select & submit <u>Familiar Route ${routeNumber}</u>:<br>${displayedTarget}</b></p>`
    : `<p><b>Please reproduce <u>Familiar Route ${routeNumber}</u> from memory and submit it.</b></p>`;

  //hintHtml += "<p>Hover to see: the same flight's cost / city's quarantine time changes across scenarios!</p>"
  return {
    type: jsPsychItineraryGraph,
    radius: 300,
    center_x: CONFIG.canvas_size / 2,
    center_y: CONFIG.canvas_size / 2,
    width: CONFIG.canvas_size,
    height: CONFIG.canvas_size,

    problem: problem,
    loss_weights: CONFIG.loss_weights,

    time_limit_sec: null,
    force_end_on_timeout: true,

    label_font_px: 12,
    ring_order: layout.ring_order,
    displayed_city_names: subject_mapping,

    highlight_best_path: false,
    labels_visible_by_default: false,

    enable_select_edges: true,
    include_cityname: true,
    include_virus: false,
    include_q_cost: false,

    enable_reveal_labels: true,
    enable_hover_reveal: false,
    enable_highlight: false,
    allow_multiple_right_click_labels: true,
    enable_drag_labels: true,

    hover_reveal_delay_ms: CONFIG.hover_reveal_delay_ms,
    hover_hide_delay_ms: 0,

    acceptable_paths: [targetPathString],
    bold_path_string: isCued ? targetPathString : null,
    bold_path_string_color: "black",
    bold_path_string_edgewidth: 4,
    right_panel_hint_html: hintHtml,

    data: {
      phase: "practice",
      practice_trial_kind: isCued ? "cued" : "uncued",
      practice_attempt_tag: attemptTag,
      target_route_number: routeNumber,
      target_path_string: targetPathString,
      target_path_displayed: displayedTarget,

      sampled_test_order: localTrialIndex,
      problem_idx: sampledItem.trial_idx,

      cached_solution_1: sampledSet.cachedSolutions[0],
      cached_solution_2: sampledSet.cachedSolutions[1],
      cached_solution_1_displayed: convertPathToDisplayedCityNames(sampledSet.cachedSolutions[0], subject_mapping),
      cached_solution_2_displayed: convertPathToDisplayedCityNames(sampledSet.cachedSolutions[1], subject_mapping),
    },

    on_finish: function(data) {
      data.mapping = subject_mapping;
      data.ring_order = layout.ring_order.slice();
      data.trial_number = localTrialIndex;

      const submittedPathString = pathArrayToArrowString(data.path || []);
      data.submitted_path_string = submittedPathString;
      data.submitted_path_string_displayed = convertPathToDisplayedCityNames(submittedPathString, subject_mapping);

      // Final submitted route equals target route
      data.practice_target_match = (submittedPathString === targetPathString);

      // Strict memory success for uncued trials:
      // must match target and must not have triggered any prevention popup
      data.practice_memory_success =
        (!isCued) &&
        data.practice_target_match &&
        data.invalid_submit_count_never === true;

      data.cached_solution_chosen_label = getCachedPathMatchLabel(
        submittedPathString,
        sampledSet.cachedSolutions[0],
        sampledSet.cachedSolutions[1]
      );

      data.is_practice = 1;

      const dfRow = rowByTrialIdx.get(Number(sampledItem.trial_idx)) || null;
      if (dfRow) {
        const lossCol1 = `loss::${CONFIG.path_length_tag} ${sampledSet.cachedSolutions[0]}`;
        const lossCol2 = `loss::${CONFIG.path_length_tag} ${sampledSet.cachedSolutions[1]}`;

        data.cached_solution_1_loss = toFiniteNumberOrNull(dfRow[lossCol1]);
        data.cached_solution_2_loss = toFiniteNumberOrNull(dfRow[lossCol2]);
        data.cached_solution_lower_loss_label = getLowerLossLabel(
          data.cached_solution_1_loss,
          data.cached_solution_2_loss
        );

        data.trial_best_loss = toFiniteNumberOrNull(dfRow["trial_best_loss"]);
        data.trial_best_path = dfRow["trial_best_path"] ?? null;
        data.trial_best_path_displayed = convertPathToDisplayedCityNames(data.trial_best_path, subject_mapping);
      } else {
        data.cached_solution_1_loss = null;
        data.cached_solution_2_loss = null;
        data.cached_solution_lower_loss_label = null;
        data.trial_best_loss = null;
        data.trial_best_path = null;
        data.trial_best_path_displayed = null;
      }

      //console.log("Finished practice trial:", data);
    }
  };
}

        exampleLayout1.ring_order = subject_ring_order.slice();

        const examplePath2 = normalizePath(sampledSet.cachedSolutions[1]);
        const eq = makeExampleEquationStrings(exampleProblem1, examplePath1, {
          includeStartQuarantine: false,
          includeGoalQuarantine: true,
          dayValue: Math.floor(CONFIG.loss_weights.time / CONFIG.loss_weights.money),
        });
        const lastIndex0 = eq.quarantineDaysStr.indexOf("=");
        const lastIndex = eq.totalCostStr.lastIndexOf("=");
        const eq2 = makeExampleEquationStrings(exampleProblem1, examplePath2, {
          includeStartQuarantine: false,

    function resetInstructionGate() {
      window._itgInstructionGate = {
        has_selected_edge: false,
        has_revealed_node: false,
        has_revealed_edge: false,
        has_dragged_label: false

    function getInstructionNextButton() {
      return (
        document.querySelector("#jspsych-instructions-next") ||
        Array.from(document.querySelectorAll("button")).find(
          btn => btn.textContent.trim().toLowerCase() === "next"
        )
      );
    }

    function setInstructionNextLocked(locked) {
      const nextBtn = getInstructionNextButton();
      if (!nextBtn) return;

      nextBtn.disabled = !!locked;
      nextBtn.style.opacity = locked ? "0.5" : "1";
      nextBtn.style.cursor = locked ? "not-allowed" : "";
    }
    function currentPageHasExampleGraphClicks() {
      return !!document.getElementById("example-graph-clicks");
    }

    function instructionGateIsReady() {
      const g = window._itgInstructionGate;
      return !!(
        g.has_selected_edge &&
        g.has_revealed_node &&
        g.has_revealed_edge &&
        g.has_dragged_label
      );
    }

    function instructionKeyGateHandler(ev) {
      if (!currentPageHasExampleGraphClicks()) return;
      if (instructionGateIsReady()) return;

      const blockedKeys = ["ArrowRight", "Right", " ", "Spacebar", "Enter"];

      if (blockedKeys.includes(ev.key)) {
        ev.preventDefault();
        ev.stopPropagation();
        if (typeof ev.stopImmediatePropagation === "function") {
          ev.stopImmediatePropagation();
        }
      }
    }

    function safeRenderGraph(hostId, renderConfig) {
      const host = document.getElementById(hostId);
      if (!host) return;
      if (host.dataset.rendered === "1") return;

      host.dataset.rendered = "1";
      //console.log("Rendering instruction graph into:", hostId);
      window.renderItineraryGraphStatic(host, renderConfig);
    }

        
    function updateInstructionChecklistUI() {
      const g = window._itgInstructionGate;

      const clickEl = document.getElementById("req-click-flight");
      const cityEl = document.getElementById("req-reveal-city");
      const flightEl = document.getElementById("req-reveal-flight");
      const dragEl = document.getElementById("req-drag-label");

      if (clickEl) {
        clickEl.textContent = `${g.has_selected_edge ? "✓" : "✗"} Select at least one flight`;
        clickEl.style.color = g.has_selected_edge ? "#2e7d32" : "";
      }

      if (cityEl) {
        cityEl.textContent = `${g.has_revealed_node ? "✓" : "✗"} Reveal one city's info tag`;
        cityEl.style.color = g.has_revealed_node ? "#2e7d32" : "";
      }

      if (flightEl) {
        flightEl.textContent = `${g.has_revealed_edge ? "✓" : "✗"} Reveal one flight's info tag`;
        flightEl.style.color = g.has_revealed_edge ? "#2e7d32" : "";
      }
      if (dragEl) {
        dragEl.textContent = `${g.has_dragged_label ? "✓" : "✗"} Drag an info tag around`;
        dragEl.style.color = g.has_dragged_label ? "#2e7d32" : "";
      }
    }
