    // Check if submitted solution is part of the cached solution
    function containsOnlySpecificValues(arr, allowedValues=[0,2,6]) {
        // Use the every() method to check if all elements satisfy the condition.
        // The condition is that the allowedValues array must include the current element.
        return arr.every(element => allowedValues.includes(element));
    }

    // Parse response into equations
        /**
     * Turn an equation dict {x,y,z} into a canonical key "min,max,z"
     * so x+y=z and y+x=z map to the same key.
     */
    function eqDictToKey(eq) {
    const a = Math.min(eq.x, eq.y);
    const b = Math.max(eq.x, eq.y);
    return `${a},${b},${eq.z}`;
    }

    /**
     * Parse "A + B = D" (tolerates "->" too) into {A,B,C} letters.
     * Returns null if parsing fails.
     */
    function parseSubmittedEqString(s) {
    if (typeof s !== 'string') return null;
    const t = s.trim().toUpperCase();

    // Accept either "=" or "->" or "→"
    // Example matches: "A + B = D", "A+B->D", "A + B → D"
    const m = t.match(/^([A-ZΑ-Ω])\s*\+\s*([A-ZΑ-Ω])\s*(?:=|->|→|➡|→)\s*([A-ZΑ-Ω])$/);
    if (!m) return null;

    return { A: m[1], B: m[2], C: m[3] };
    }

    /**
     * Convert letters to ints using letter_to_int.
     * Returns null if any letter isn't found.
     */
    function lettersToInts(parsed, letter_to_int) {
    if (!parsed) return null;
    const x = letter_to_int[parsed.A];
    const y = letter_to_int[parsed.B];
    const z = letter_to_int[parsed.C];
    if (x === undefined || y === undefined || z === undefined) return null;
    return { x, y, z };
    }

    function buildKeyToIndexMap(equations) {
    const keyToIndex = new Map();
    for (let i = 0; i < equations.length; i++) {
        const key = eqDictToKey(equations[i]);
        if (!keyToIndex.has(key)) keyToIndex.set(key, i);
    }
    return keyToIndex;
    }

    /**
     * Main function:
     * submitted_eqs_rearranged_sorted: array of strings like ["A + B = D", ...]
     * letter_to_int: mapping like {A:0, B:1, ...}
     * equations: array of dicts like [{x:0,y:1,z:3}, ...]
     *
     * Returns sorted array of indices, using -1 for "not found / invalid".
     */
    function computeResponseEquationIndicesSorted(
    submitted_eqs_rearranged_sorted,
    letter_to_int,
    equations,
    sort_and_push_neg1
    ) {
    // Build key -> index map for fast lookup
    const keyToIndex = new Map();
    for (let i = 0; i < equations.length; i++) {
        const key = eqDictToKey(equations[i]);
        // If duplicates exist, keep the first index (or change to last if you prefer)
        if (!keyToIndex.has(key)) keyToIndex.set(key, i);
    }

    // Map each submitted eq to an index (or -1)
    const indices = (submitted_eqs_rearranged_sorted || []).map((eqStr) => {
        const parsed = parseSubmittedEqString(eqStr);
        const ints = lettersToInts(parsed, letter_to_int);
        if (!ints) return -1;

        // Canonicalize LHS
        const a = Math.min(ints.x, ints.y);
        const b = Math.max(ints.x, ints.y);
        const key = `${a},${b},${ints.z}`;

        return keyToIndex.has(key) ? keyToIndex.get(key) : -1;
    });

    // // Sort numeric, ascending (keeps -1s at the front)
    // indices.sort((p, q) => p - q);
    // Sort numeric, ascending (keeps -1s at the end)
    if(sort_and_push_neg1){
        indices.sort((p, q) => (p === -1) - (q === -1) || (p - q));
    }
    return indices;
    }


    // Check if solution submitted is legit.
    /**
     * Validates submitted equations with optional order constraint.
     *
     * Rules:
     * (1) Every submitted equation must be in equations (no -1).
     * (2a) If equation_order_matters == false:
     *      For any initially-absent object used as reactant anywhere, it must be produced somewhere (order ignored).
     * (2b) If equation_order_matters == true:
     *      When processing rows top-to-bottom, any initially-absent reactant must already be available
     *      (produced by an earlier valid equation). Quantities ignored.
     * (3) goal_object must be produced at least once (RHS of some VALID submitted equation).
     *
     * Returns rich diagnostics.
     */
    function validateSubmittedEquations(
    submitted_eqs_rearranged_sorted,
    letter_to_int,
    equations,
    color_vector,
    goal_object,
    equation_order_matters = true // NEW optional arg
    ) {
    const submitted = Array.isArray(submitted_eqs_rearranged_sorted)
        ? submitted_eqs_rearranged_sorted
        : [];

    const keyToIndex = buildKeyToIndexMap(equations);

    const response_equation_indices = [];
    const invalid_rows = [];
    const invalid_equations = [];

    // Track products/reactants for the "order doesn't matter" mode
    const usedAsReactant = new Set();
    const producedAsProduct = new Set();

    // Track whether goal_object is produced
    let goal_produced = false;

    // For order-matters mode: availability set (ints that are currently "available")
    const available = new Set();
    for (let i = 0; i < color_vector.length; i++) {
        if (color_vector[i] === 1) available.add(i);
    }

    // Diagnostics for order-matters violations
    const order_violations = []; // array of {rowIdx, missingReactants:[...], equation:String}

    for (let rowIdx = 0; rowIdx < submitted.length; rowIdx++) {
        const s = submitted[rowIdx];

        const parsed = parseSubmittedEqString(s);
        const ints = lettersToInts(parsed, letter_to_int);

        if (!ints) {
        response_equation_indices.push(-1);
        invalid_rows.push(rowIdx);
        invalid_equations.push(String(s));
        continue;
        }

        // Canonicalize x,y for matching allowed equations
        const a = Math.min(ints.x, ints.y);
        const b = Math.max(ints.x, ints.y);
        const key = `${a},${b},${ints.z}`;

        const idx = keyToIndex.has(key) ? keyToIndex.get(key) : -1;
        response_equation_indices.push(idx);

        if (idx === -1) {
        invalid_rows.push(rowIdx);
        invalid_equations.push(String(s));
        continue; // do not let invalid equations affect availability/production
        }

        // VALID equation: update shared tracking
        usedAsReactant.add(ints.x);
        usedAsReactant.add(ints.y);
        producedAsProduct.add(ints.z);

        if (ints.z === goal_object) {
        goal_produced = true;
        }

        // If order matters, check reactants are available *before* producing product
        if (equation_order_matters) {
        const missing = [];
        // Only care about initially-absent objects; initially-present always OK.
        // But practically, availability already encodes that, so we check availability directly.
        if (!available.has(ints.x) && color_vector[ints.x] === 0) missing.push(ints.x);
        if (!available.has(ints.y) && color_vector[ints.y] === 0) missing.push(ints.y);

        if (missing.length > 0) {
            order_violations.push({
            rowIdx,
            missingReactants: missing,
            equation: String(s)
            });
        }

        // After the check, we "produce" the product and make it available for later rows
        available.add(ints.z);
        }
    }

    // Rule (1): no invalid equations
    const hasInvalid = invalid_rows.length > 0;

    // Rule (2): feasibility of absent reactants
    let missing_produced_ints = [];

    if (!equation_order_matters) {
        // Order-free mode: any absent reactant used must be produced somewhere
        usedAsReactant.forEach((objInt) => {
        const initiallyPresent = color_vector[objInt] === 1;
        if (!initiallyPresent) {
            const everProduced = producedAsProduct.has(objInt);
            if (!everProduced) missing_produced_ints.push(objInt);
        }
        });
        missing_produced_ints.sort((p, q) => p - q);
    } else {
        // Order-matters mode: violations are recorded per row; we can also aggregate missing ints
        const agg = new Set();
        order_violations.forEach(v => v.missingReactants.forEach(x => agg.add(x)));
        missing_produced_ints = Array.from(agg).sort((p, q) => p - q);
    }

    // Sort indices as requested
    // const response_equation_indices_sorted = [...response_equation_indices].sort((p, q) => p - q);
    // Sort numeric, ascending (keeps -1s at the end)
    const response_equation_indices_sorted = [...response_equation_indices].sort((p, q) => (p === -1) - (q === -1) || (p - q));

    // Rule (3): goal must be produced
    const order_ok = equation_order_matters ? (order_violations.length === 0) : true;

    const is_legit = !hasInvalid &&
                    missing_produced_ints.length === 0 &&
                    goal_produced &&
                    order_ok;

    return {
        is_legit,
        response_equation_indices,
        response_equation_indices_sorted,
        invalid_rows,
        invalid_equations,
        // In order-free mode: "absent used but never produced"
        // In order-matters mode: union of "absent used before available"
        missing_produced_ints,
        // Only meaningful when equation_order_matters === true
        order_violations,
        goal_produced
    };
    }


    // Visibility tracker for new hard condition
    // colorVector: same vector used to generate the stimulus
    function setupEquationHoverReveal(colorVector) {
    var container = document.getElementById('equation-list');
    if (!container) {
        console.warn('setupEquationHoverReveal: #equation-list not found');
        return;
    }

    // If you run multiple trials, prevent duplicate listeners
    if (container.dataset.hoverBound === '1') return;
    container.dataset.hoverBound = '1';

    function setTokenColor(tokenEl, isHovering) {
        var n = parseInt(tokenEl.getAttribute('data-int'), 10);
        if (Number.isNaN(n)) return;

        // Always return to black on mouseout
        if (!isHovering) {
        tokenEl.classList.remove('num-green', 'num-red');
        tokenEl.classList.add('num-black');
        return;
        }

        // On hover: green if present, red if absent
        var present = colorVector[n] === 1;

        tokenEl.classList.remove('num-black', 'num-gray', 'num-green', 'num-red');
        tokenEl.classList.add(present ? 'num-green' : 'num-red');
    }

    container.addEventListener('mouseover', function(e) {
        var t = e.target;
        if (t && t.classList && t.classList.contains('eq-token')) {
        setTokenColor(t, true);
        }
    });

    container.addEventListener('mouseout', function(e) {
        var t = e.target;
        if (t && t.classList && t.classList.contains('eq-token')) {
        setTokenColor(t, false);
        }
    });
    }


    /**
 * Attaches hover reveal + logging to #equation-list.
 *
 * Returns an object:
 * {
 *   getLogs: () => hoverLogsArray
 * }
 *
 * You call this in on_load, then on_finish you store getLogs().
 */
function setupEquationHoverRevealAndLogging(colorVector, containerId='equation-list') {
  const container = document.getElementById(containerId);
  if (!container) {
    console.warn('Hover logger: container not found:', containerId);
    return null;
  }

  // prevent duplicate binding
  if (container.__hoverLogger) return container.__hoverLogger;

  const t0 = performance.now();
  const logs = [];
  const activeStart = new Map(); // Element -> start time
  let nOver = 0, nOut = 0;

  function setTokenColor(el, hovering) {
    const n = parseInt(el.dataset.int, 10);
    if (Number.isNaN(n)) return;

    if (!hovering) {
      el.classList.remove('num-green', 'num-red');
      el.classList.add('num-black');
      return;
    }

    const present = colorVector[n] === 1;
    el.classList.remove('num-black', 'num-gray', 'num-green', 'num-red');
    el.classList.add(present ? 'num-green' : 'num-red');
  }

  function getDisplayedEquationString(tokenEl) {
    const row = tokenEl.closest('.equation-row');
    if (!row) return '';
    const toks = row.querySelectorAll('.eq-token');
    const letters = Array.from(toks).map(t => t.dataset.letter || t.textContent);
    return letters.length >= 3 ? `${letters[0]} + ${letters[1]} = ${letters[2]}` : row.textContent.trim();
  }

  container.addEventListener('pointerover', (e) => {
    const t = e.target;
    if (!(t && t.classList && t.classList.contains('eq-token'))) return;
    nOver++;
    if (!activeStart.has(t)) activeStart.set(t, performance.now());
    setTokenColor(t, true);
  });

  container.addEventListener('pointerout', (e) => {
    const t = e.target;
    if (!(t && t.classList && t.classList.contains('eq-token'))) return;
    nOut++;

    const start = activeStart.get(t);
    if (start !== undefined) {
      const end = performance.now();
      activeStart.delete(t);

      logs.push({
        displayed_letter: t.dataset.letter || t.textContent,
        letter_idx: parseInt(t.dataset.int, 10),
        object_is_present: colorVector[parseInt(t.dataset.int, 10)],
        displayed_equation: getDisplayedEquationString(t),
        equation_idx: parseInt(t.dataset.eqIndex, 10),
        hover_onset_ms: start - t0,
        hover_duration_ms: end - start,
        displayed_equation_row: parseInt(t.dataset.displayRow, 10),
        letter_in_equation_role: t.dataset.role
      });
    }
    setTokenColor(t, false);
  });

  function finalize() {
    // close any active hover at submit time
    const now = performance.now();
    activeStart.forEach((start, t) => {
      logs.push({
        letter: t.dataset.letter || t.textContent,
        int_index: parseInt(t.dataset.int, 10),
        displayed_equation: getDisplayedEquationString(t),
        equation_index: parseInt(t.dataset.eqIndex, 10),
        hover_onset_ms: start - t0,
        hover_duration_ms: now - start,
        display_row: parseInt(t.dataset.displayRow, 10),
        role: t.dataset.role
      });
    });
    activeStart.clear();
  }

  const logger = {
    logs,          // <-- IMPORTANT: array reference you will save later
    finalize,
    debug: () => ({ nOver, nOut, nLogs: logs.length })
  };

  container.__hoverLogger = logger;
  return logger;
}

function clearMissingBlankHighlights(scopeEl) {
  const scope = scopeEl || document;
  scope.querySelectorAll('input.sym.missing-blank').forEach(el => {
    el.classList.remove('missing-blank');
  });
}

function findFirstIncompleteBlank(rowsEl) {
  const rows = Array.from(rowsEl.querySelectorAll('.eq-row'));
  for (const row of rows) {
    const inputs = Array.from(row.querySelectorAll('input.sym'));
    const missing = inputs.filter(inp => !(inp.value && inp.value.trim().length > 0));
    if (missing.length > 0) {
      return { row, missing };
    }
  }
  return null;
}



    // ----------Stimulus--------------
    // equations: array of {x, y, z}
    // colorVector: array of 0/1
    // randomize: boolean — shuffle equation order
    // sort_terms: boolean — reorder x,y alphabetically by displayed letters
    // hover_reveal: boolean — if true: initially all black, hover reveals green/red
function generateEquationHTML(equations, colorVector, randomize, sort_terms, hover_reveal, equations_shuffle_idx, randomize_equation_order_display_once) {
  // decorate with stable index
  var eqs = equations.map(function(eq, i) {
    return { x: eq.x, y: eq.y, z: eq.z, _eqIndex: i };
  });

  if (randomize) {// randomize for each trial
    eqs = jsPsych.randomization.shuffle(eqs);
  }
  if(randomize_equation_order_display_once){//randomiize once for all trials; hence use cached version.
    eqs = equations_shuffle_idx.map(idx => eqs[idx]);
  }

  var htmlRows = eqs.map(function(eq, displayRowIdx) {
    var x_num = eq.x;
    var y_num = eq.y;

    if (sort_terms) {
      var xLetter = int_to_letter[x_num];
      var yLetter = int_to_letter[y_num];
      if (yLetter < xLetter) {
        var tmp = x_num; x_num = y_num; y_num = tmp;
      }
    }

    var z_num = eq.z;

    function baseClass(n) {
      if (hover_reveal) return 'num-black';
      return colorVector[n] ? 'num-green' : 'num-red';
    }

    function tokenSpan(n, role) {
      var letter = int_to_letter[n];
      var cls = baseClass(n);

      return (
        '<span class="eq-token ' + cls + '" ' +
          'data-letter="' + letter + '" ' +
          'data-int="' + n + '" ' +
          'data-role="' + role + '" ' +
          'data-display-row="' + displayRowIdx + '" ' +
          'data-eq-index="' + eq._eqIndex + '">' +
          letter +
        '</span>'
      );
    }

    return (
      '<div class="equation-row" ' +
           'data-display-row="' + displayRowIdx + '" ' +
           'data-eq-index="' + eq._eqIndex + '">' +
        tokenSpan(x_num, 'x') +
        '&nbsp;+&nbsp;' +
        tokenSpan(y_num, 'y') +
        '&nbsp;&rarr;&nbsp;' +
        tokenSpan(z_num, 'z') +
      '</div>'
    );
  });

    // Add a stable container id so the hover setup can attach once
    var stim_html = '<div class="equation-list" id="equation-list">' + htmlRows.join('') + '</div>';

    // Save the actual equation display (in letters) participants see
    var eqs_displayed = [];
    for (let i=0; i<eqs.length; i++){
        eqs_displayed.push(int_to_letter[eqs[i].x] + " + " + int_to_letter[eqs[i].y] + " -> " + int_to_letter[eqs[i].z])
    }
    return({stim_html, eqs, eqs_displayed});

}

function generateTwoPanelStimulus(
  equations,
  colorVector,
  randomizeEq,
  sort_terms,
  leftMode,
  randomizeLetters,
  distractorLetters,
  totalLeftCount,
  enableHoverToggle,   
  equations_shuffle_idx, randomize_equation_order_display_once,
    // NEW:
  hide_products = false,
  always_show_product_eq_indices = []   // indices in ORIGINAL `equations` array
) {
  // ----------------------------
  // 1) LEFT PANEL: collect "present" LATIN letters
  // ----------------------------
  var presentNums = [];
  for (var i = 0; i < colorVector.length; i++) {
    if (colorVector[i] === 1 && int_to_letter[i] !== undefined) {
      presentNums.push(i);
    }
  }

  var presentLetters = presentNums.map(function(n) {
    return int_to_letter[n];
  });

  // ----------------------------
  // 2) Sample distractors to reach totalLeftCount, if requested
  // ----------------------------
  var distractorsUsed = [];

  if (
    Array.isArray(distractorLetters) &&
    distractorLetters.length > 0 &&
    typeof totalLeftCount === 'number'
  ) {
    var needed = totalLeftCount - presentLetters.length;
    if (needed > 0) {
      distractorsUsed = jsPsych.randomization.sampleWithReplacement(
        distractorLetters,
        needed
      );
    }
  }

  // ----------------------------
  // 3) Combine & order letters for LEFT panel
  // ----------------------------
  var allLetters;

  if (randomizeLetters) {
    // Randomize everything together: real letters + distractors
    allLetters = presentLetters.concat(distractorsUsed);
    allLetters = jsPsych.randomization.shuffle(allLetters);
  } else {
    // Keep real letters in alphabetical order,
    // insert distractors at random positions, without disturbing that order
    var base = presentLetters.slice().sort(); // sorted real letters
    allLetters = base.slice();

    distractorsUsed.forEach(function(d) {
      var pos = Math.floor(Math.random() * (allLetters.length + 1)); // 0..len
      allLetters.splice(pos, 0, d);
    });
  }

  // ----------------------------
  // 4) Build LEFT panel HTML (line or circle)
  // ----------------------------
  var leftHTML = '';

  if (leftMode === 'circle') {
    var letterCount = allLetters.length;
    var cx = 125;    // center x (px)
    var cy = 125;    // center y (px)
    var radius = 150; // ring radius

    var letterSpans = allLetters.map(function(letter, idx) {
      if (letterCount === 0) return '';

      var angle = 2 * Math.PI * idx / letterCount - Math.PI / 2;
      var x = cx + radius * Math.cos(angle);
      var y = cy + radius * Math.sin(angle);

      return (
        '<div class="panel-left-circle-letter" ' +
          'style="left:' + x + 'px; top:' + y + 'px;">' +
          letter +
        '</div>'
      );
    });

    leftHTML =
      '<div class="panel-left-circle-wrapper">' +
        letterSpans.join('') +
      '</div>';

  } else {
    // line mode: space-separated string, wrapping via CSS
    var lineString = allLetters.join(' ');
    leftHTML =
      '<div class="panel-left-content-line">' +
        lineString +
      '</div>';
  }

  // ----------------------------
// 5) RIGHT PANEL: equations (all black) + OPTIONAL product masking
// ----------------------------
  var eqs = equations.map(function(eq, i){
    return { x:eq.x, y:eq.y, z:eq.z, _eqIndex:i };
  });

  if (randomizeEq) {
    eqs = jsPsych.randomization.shuffle(eqs);
  }
  if (randomize_equation_order_display_once) {
    eqs = equations_shuffle_idx.map(idx => eqs[idx]);
  }

  var alwaysSet = Array.isArray(always_show_product_eq_indices)
    ? new Set(always_show_product_eq_indices)
    : new Set();

  var eqRows = eqs.map(function(eq) {
    var x_num = eq.x;
    var y_num = eq.y;

    if (sort_terms) {
      var xL = int_to_letter[x_num];
      var yL = int_to_letter[y_num];
      if (yL < xL) {
        var tmp = x_num;
        x_num = y_num;
        y_num = tmp;
      }
    }

    var z_num = eq.z;

    var xLetter = int_to_letter[x_num];
    var yLetter = int_to_letter[y_num];
    var zLetter = int_to_letter[z_num];

    // NEW: mask RHS product unless allowlisted
    var maskThis = hide_products && !alwaysSet.has(eq._eqIndex);
    var zShownText = maskThis ? '?' : zLetter;

    var eqString = `${xLetter} + ${yLetter} -> ${zLetter}`;  // true product letter
    return (
      '<div class="equation-row" data-eq-index="' + eq._eqIndex + '" data-eq-string="' + eqString + '">' +
        '<span class="num-black">' + xLetter + '</span>' +
        '&nbsp;+&nbsp;' +
        '<span class="num-black">' + yLetter + '</span>' +
        '&nbsp;&rarr;&nbsp;' +
        '<span class="num-black rhs-product ' + (maskThis ? 'rhs-masked' : '') + '" ' +
        'data-role="z" ' +
        'data-eq-index="' + eq._eqIndex + '" ' +
        'data-int="' + z_num + '" ' +
        'data-letter="' + zLetter + '" ' +
        'data-hidden="' + (maskThis ? '1' : '0') + '">' +
          zShownText +
        '</span>'
        +
        '</div>'
    );

  });

  var rightHTML =
    '<div class="equation-list" id="equation-list-right">' +
      eqRows.join('') +
    '</div>';

  // ----------------------------
  // 6) Combine into two-panel layout
  // ----------------------------
  // Note: we don't actually use enableHoverToggle inside the HTML;
  // it will be used by the trial's on_load to attach listeners.
  var stim_html =
    '<div class="two-panel-stimulus" id="two-panel-stimulus">' +
      '<div class="panel-left" id="panel-left">' +
        leftHTML +
      '</div>' +
      '<div class="panel-right" id="panel-right">' +
        rightHTML +
      '</div>' +
    '</div>';

    // Left panel: Save the objects displayed (letters + distractors; if ring display, start from top and go clockwise)
    // Right panel: Save the actual equation display (in letters) participants see
    var eqs_displayed = [];
    for (let i=0; i<eqs.length; i++){
      eqs_displayed.push(
        int_to_letter[eqs[i].x] + " + " + int_to_letter[eqs[i].y] + " -> " + int_to_letter[eqs[i].z]
      );
    }

  return({stim_html, eqs, eqs_displayed, allLetters});
}


function setupRightPanelProductRevealWithLogging(rightListId, hoverLog) {
  const root = document.getElementById(rightListId);
  if (!root) {
    console.warn('setupRightPanelProductRevealWithLogging: missing', rightListId);
    return;
  }
  if (root.__rhsRevealBound) return;

  // Track currently-hovered RHS tokens
  const active = new Map(); // el -> startTime

  function reveal(el) {
    if (!el || el.dataset.hidden !== '1') return;
    el.textContent = el.dataset.letter || '';
    el.dataset.revealed = '1';
  }

  function mask(el) {
    if (!el || el.dataset.hidden !== '1') return;
    el.textContent = '?';
    el.dataset.revealed = '0';
  }

  function logClose(el, endTime, reason) {
    const t0 = active.get(el);
    if (typeof t0 !== 'number') return;

    const row = el.closest('.equation-row');
    const eqString = row ? (row.dataset.eqString || '') : '';

    hoverLog.product_hovers.push({
      t_start_ms: t0 - hoverLog.t0,
      t_end_ms:   endTime - hoverLog.t0,
      dur_ms:     endTime - t0,
      eq_index:       Number(el.dataset.eqIndex),
      product_int:    Number(el.dataset.int),
      product_letter: String(el.dataset.letter || ''),
      equation_letters: eqString,
      close_reason: reason || 'leave'
    });

    active.delete(el);
  }

  // Use pointerenter/leave in CAPTURE phase for robustness
  root.addEventListener('pointerenter', (e) => {
    const t = e.target;
    if (!t || !t.classList || !t.classList.contains('rhs-product')) return;
    if (t.dataset.hidden !== '1') return;

    reveal(t);
    if (!active.has(t)) active.set(t, performance.now());
  }, true);

  root.addEventListener('pointerleave', (e) => {
    const t = e.target;
    if (!t || !t.classList || !t.classList.contains('rhs-product')) return;
    if (t.dataset.hidden !== '1') return;

    const now = performance.now();
    logClose(t, now, 'leave');
    mask(t);
  }, true);

  // If the pointer gets canceled (trackpad gestures, window switches, etc.)
  root.addEventListener('pointercancel', (e) => {
    const t = e.target;
    if (!t || !t.classList || !t.classList.contains('rhs-product')) return;
    if (t.dataset.hidden !== '1') return;

    const now = performance.now();
    logClose(t, now, 'cancel');
    mask(t);
  }, true);

  // Public “panic button”: close + mask EVERYTHING that’s currently active/revealed
  root.__forceCloseAllProductHovers = function(reason) {
    const now = performance.now();

    // Close active timers
    for (const [el, start] of active.entries()) {
      logClose(el, now, reason || 'force_close');
      mask(el);
    }
    active.clear();

    // Also mask any revealed tokens that somehow escaped tracking
    const tokens = root.querySelectorAll('.rhs-product[data-hidden="1"]');
    tokens.forEach(mask);
  };

  root.__rhsRevealBound = true;
}


function setupPanelHoverToggleWithLogging(hoverLog) {
  const container = document.getElementById('two-panel-stimulus');
  const left      = document.getElementById('panel-left');
  const right     = document.getElementById('panel-right');

  if (!container || !left || !right) {
    console.warn('Hover toggle: missing container or panels');
    return;
  }

  // helper: force-close product hover if we are hiding the right panel
  function forceCloseRightPanelProducts(reason) {
    const rhsRoot = document.getElementById('equation-list-right');
    if (rhsRoot && typeof rhsRoot.__forceCloseAllProductHovers === 'function') {
      rhsRoot.__forceCloseAllProductHovers(reason || 'panel_switch');
    }
  }

  // Initial: show left only
  left.classList.add('panel-visible');
  left.classList.remove('panel-hidden');
  right.classList.add('panel-hidden');
  right.classList.remove('panel-visible');

  // logging state
  let currentPanel = 'left';
  let currentStart = performance.now();

  function closeInterval(endTime) {
    hoverLog.panel_hovers.push({
      panel: currentPanel,
      t_start_ms: currentStart - hoverLog.t0,
      t_end_ms:   endTime - hoverLog.t0,
      dur_ms:     endTime - currentStart
    });
  }

  function switchTo(panel, now) {
    if (panel === currentPanel) return;

    // close previous interval
    closeInterval(now);

    // if we are leaving RIGHT panel, force-close RHS product hover
    if (currentPanel === 'right') {
      forceCloseRightPanelProducts('leave_right_panel');
    }

    currentPanel = panel;
    currentStart = now;
  }

  function handleMouseMove(e) {
    const rect = container.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const mid  = rect.width / 2;
    const now  = performance.now();

    if (relX < mid) {
      if (!left.classList.contains('panel-visible')) {
        // Switching to left
        right.classList.add('panel-hidden');
        right.classList.remove('panel-visible');

        left.classList.add('panel-visible');
        left.classList.remove('panel-hidden');

        switchTo('left', now);
      }
    } else {
      if (!right.classList.contains('panel-visible')) {
        // Switching to right
        left.classList.add('panel-hidden');
        left.classList.remove('panel-visible');

        right.classList.add('panel-visible');
        right.classList.remove('panel-hidden');

        switchTo('right', now);
      }
    }
  }

  function handleMouseLeave() {
    const now = performance.now();
    closeInterval(now);

    // leaving the container: if we were on right, force close products
    if (currentPanel === 'right') {
      forceCloseRightPanelProducts('leave_container');
    }

    // restart
    currentStart = performance.now();
  }

  container.addEventListener('mousemove', handleMouseMove);
  container.addEventListener('mouseleave', handleMouseLeave);

  hoverLog._finalizePanels = function() {
    const now = performance.now();
    closeInterval(now);

    // also force-close products at trial end
    forceCloseRightPanelProducts('trial_finalize');
  };
}

        inp.setAttribute('autocomplete', 'off');
        inp.setAttribute('autocapitalize', 'characters');
        inp.setAttribute('inputmode', 'text');

        // IMPORTANT: we will manage 1-char ourselves
        inp.setAttribute('maxlength', '2'); // allow paste; we'll sanitize down to 1

        // Helper: focus next .sym input in DOM order
        function focusNext(current) {
          const all = Array.from(document.querySelectorAll('input.sym'));
          const idx = all.indexOf(current);
          if (idx >= 0 && idx < all.length - 1) {
            all[idx + 1].focus();
            all[idx + 1].select();
          }
        }

        // Helper: focus previous
        function focusPrev(current) {
          const all = Array.from(document.querySelectorAll('input.sym'));
          const idx = all.indexOf(current);
          if (idx > 0) {
            all[idx - 1].focus();
            all[idx - 1].select();
          }
        }

        // When user clicks a filled blank, highlight it so typing overwrites
        inp.addEventListener('focus', () => {
          // select existing char so next keystroke overwrites
          setTimeout(() => inp.select(), 0);
        });

        // Force overwrite behavior:
        // - keep only last typed allowed char
        // - then jump to next blank
        inp.addEventListener('input', (e) => {
          inp.classList.remove('missing-blank');
          const raw = (inp.value || '').toUpperCase();

          // Extract allowed characters from what they typed/pasted
          const candidates = raw.split('').filter(ch => validateOneChar(ch));
          const last = candidates.length ? candidates[candidates.length - 1] : '';

          inp.value = last; // overwrite with exactly 1 char (or blank)

          if (last !== '') {
            focusNext(inp);
          }
        });

        // Allow easy overwrite even if cursor isn't selecting (some browsers)
        // If a letter key is pressed, we overwrite immediately and advance.
        inp.addEventListener('keydown', (e) => {
          // Navigation
          if (e.key === 'ArrowLeft') { e.preventDefault(); focusPrev(inp); return; }
          if (e.key === 'ArrowRight') { e.preventDefault(); focusNext(inp); return; }

          // Backspace: clear, and if already empty move back
          if (e.key === 'Backspace') {
            if (inp.value) {
              // clear current
              inp.value = '';
            } else {
              // move back
              focusPrev(inp);
            }
            e.preventDefault();
            return;
          }

          // Delete: clear current
          if (e.key === 'Delete') {
            inp.value = '';
            e.preventDefault();
            return;
          }

          // If they type a single character, overwrite and advance
          if (e.key && e.key.length === 1) {
            const ch = e.key.toUpperCase();
            if (validateOneChar(ch)) {
              inp.value = ch;
              e.preventDefault();
              focusNext(inp);
            } else {
              // block invalid characters
              e.preventDefault();
            }
            return;
          }

          // Let other keys through (Tab, Enter, etc.)
        });

        // If they paste multiple letters, keep last allowed and advance
        inp.addEventListener('paste', (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text') || '';
          const chars = text.toUpperCase().split('').filter(ch => validateOneChar(ch));
          const last = chars.length ? chars[chars.length - 1] : '';
          inp.value = last;
          if (last) focusNext(inp);
        });
      });
    }

    const B0 = (Bel ? Bel.value : '').toUpperCase().slice(0,1);

    const A = validateOneChar(A0) ? A0 : '';
    const B = validateOneChar(B0) ? B0 : '';
    const C = validateOneChar(C0) ? C0 : '';

    const idx = ALLOWED_CHARS.indexOf(ch);
    return idx >= 0 ? idx : Number.POSITIVE_INFINITY;
  };

  const submitted_eqs_rearranged = rows.map(({A,B,C}) => {
    const aOK = validateOneChar(A), bOK = validateOneChar(B), cOK = validateOneChar(C);
    if (aOK && bOK) {
      const [L1, L2] = byOrder(A) <= byOrder(B) ? [A,B] : [B,A];
      return `${L1} + ${L2} = ${cOK ? C : '∅'}`;
    }
    return `${aOK ? A : '∅'} + ${bOK ? B : '∅'} = ${cOK ? C : '∅'}`;
  });

  return { rows, submitted_eqs_rearranged };

          }

        }

        //console.log(data.equation_hover_log)


        // ---- Robustly read survey-html-form result as object ----
        let respObj = {};
        try {
        if (typeof data.responses === 'string' && data.responses.trim().length > 0 && data.responses !== 'undefined') {
            respObj = JSON.parse(data.responses);
        } else if (typeof data.response === 'string' && data.response.trim().length > 0 && data.response !== 'undefined') {
            respObj = JSON.parse(data.response);
        } else if (data.responses && typeof data.responses === 'object') {
            respObj = data.responses;
        } else if (data.response && typeof data.response === 'object') {
            respObj = data.response;
        } else {
            respObj = {};
        }
        } catch (e) {
        console.warn('Could not parse survey-html-form responses:', e, data);
        respObj = {};
        }

        // Pull row order
        const orderStr = respObj.row_order || '';
        const ids = orderStr.split(',').map(s => s.trim()).filter(Boolean);

        // Final belt & suspenders: enforce 1 char + allowed set
        const rows = [];
        const normalizedStrings = [];
        ids.forEach(id => {
        const A0 = ((respObj[`row_${id}_A`] || '') + '').toUpperCase().slice(0,1);
        const B0 = ((respObj[`row_${id}_B`] || '') + '').toUpperCase().slice(0,1);
        const C0 = ((respObj[`row_${id}_C`] || '') + '').toUpperCase().slice(0,1);

        const A = validateOneChar(A0) ? A0 : '';
        const B = validateOneChar(B0) ? B0 : '';
        const C = validateOneChar(C0) ? C0 : '';

        rows.push({ A, B, C, row_id: id });
        normalizedStrings.push(`${A || '∅'} + ${B || '∅'} = ${C || '∅'}`);
        });

        data.equations_structured = rows;            // [{A,B,C,row_id}, ...]
        data.equations_normalized = normalizedStrings; // ["A + B = C", ...]
        data.n_equations = rows.length;

        // Helper: position of a token in your whitelist order
        const byOrder = (ch) => {
        const idx = ALLOWED_CHARS.indexOf(ch);
        return idx >= 0 ? idx : Number.POSITIVE_INFINITY; // unknowns last
        };

        // Build rearranged (sort LHS within each equation)
        const equations_normalized_rearranged = rows.map(({ A, B, C }) => {
        const aOK = validateOneChar(A);
        const bOK = validateOneChar(B);
        const cOK = validateOneChar(C);

        if (aOK && bOK) {
            const [L1, L2] = byOrder(A) <= byOrder(B) ? [A, B] : [B, A];
            return `${L1} + ${L2} = ${cOK ? C : '∅'}`;
        } else {
            // Keep placeholders for any invalid/missing
            return `${aOK ? A : '∅'} + ${bOK ? B : '∅'} = ${cOK ? C : '∅'}`;
        }
        });

        // Then sort the whole list by the first reactant's order
        const firstReactant = (s) => (s.split(' + ')[0] || '∅');
        const submitted_eqs_rearranged_sorted =
        [...equations_normalized_rearranged].sort((s1, s2) =>
            byOrder(firstReactant(s1)) - byOrder(firstReactant(s2))
        );

        // // Convert participants' response (sorted letter equations) into equation indices.

        // Validate the solution submitted

        const num_submitted_eqs = equations_normalized_rearranged.length;
        num_successful_trials =  num_successful_trials + is_testtrial*success; // Only count test trials for final bonus
        const bonus_trial = success * (max_bonus_per_trial - cost_per_reaction_dollars*(num_submitted_eqs-1))
        cumulative_bonus = cumulative_bonus + is_testtrial*bonus_trial; // Only count test trials for final bonus
        // console.log(bonus_trial);
        // console.log(num_submitted_eqs)
        const submitted_eqs_indices = check.response_equation_indices;
        const use_cached_solution_path = Number(containsOnlySpecificValues(submitted_eqs_indices, [0,2,6]));
        //console.log(use_cached_solution_path)
        // Save them
        data.equations = equations;
        data.goal_object = goal_object;
        data.goal_object_letter = goal_object_letter;
        // Save the mapping as experiment-level data so it appears in every row / in the data file
        data.int_to_letter = int_to_letter;
        data.letter_to_int = letter_to_int;
        // Save display toggles
        data.randomize_equation_order_display = Number(randomize_equation_order_display);
        data.randomize_equation_order_display_once = Number(randomize_equation_order_display_once);
        data.randomize_numberletter_mapping = Number(randomize_numberletter_mapping);
        data.randomize_visual_search_array = Number(randomize_visual_search_array);
        data.visual_search_array_display = visual_search_array_display;
        // Save trial-to-trial information and display.
        data.condition = condition;
        data.is_testtrial = is_testtrial;
        data.trial_idx = trial_idx;
        data.state_group = state_group;
        data.state_idx = state_idx;
        data.state = color_vector;
        data.eqs_shuffled = eqs_shuffled; // Shuffle the order of equation rows every trial
        data.eqs_shuffled_displayed = eqs_shuffled_displayed;
        data.visual_search_array_displayed = visual_search_array_displayed;
        // Save participant raw and converted responses.
        data.num_submitted_eqs = num_submitted_eqs;
        data.submitted_eqs_rearranged = equations_normalized_rearranged;
        data.submitted_eqs_rearranged_sorted = submitted_eqs_rearranged_sorted; //Only useful when equation_order_matters = False;
        data.submitted_eqs_indices = submitted_eqs_indices;
        data.submitted_eqs_indices_sorted = check.response_equation_indices_sorted; //Only useful when equation_order_matters = False;
        // Save all attempts (including invalid ones)
        data.attempted_submissions = attemptedSubmissions;
        // Optionally: save count + last attempt validity
        data.n_attempts = attemptedSubmissions.length;

        // Evaluate the solution submitted
        data.submitted_eqs_order_matters = Number(equation_order_matters); // equation order should matter! Can't first use an initially absent object and then create it later.
        data.is_correct = success;
